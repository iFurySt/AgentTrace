services:
  agenttrace:
    image: ghcr.io/ifuryst/agenttrace:latest
    platform: linux/amd64
    pull_policy: always
    environment:
      AGENTTRACE_DATABASE_DRIVER: sqlite
      AGENTTRACE_DATABASE_DSN: /app/data/agenttrace.db
      AGENTTRACE_HTTP_ADDR: :6006
      AGENTTRACE_GRPC_ADDR: :4317
    ports:
      - "16006:6006"
      - "14317:4317"
    volumes:
      - agenttrace-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6006/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  agenttrace-data:
